[workspace]
platforms = ['linux-64', 'osx-arm64', 'osx-64', 'win-64']

name = "predation_report"
channels = [
  'https://repo.prefix.dev/ecoscope-workflows/',
  'https://repo.prefix.dev/ecoscope-workflows-custom/',
  'conda-forge',
]
[dependencies]
curl = "*"
rattler-build = "*"
yq = "*"
hatch = "*"
pip = "*"
hatch-vcs = "*"

[feature.compile.dependencies]
ecoscope-workflows-ext-kbopt ="0.0.7.*"
ecoscope-workflows-ext-lion-guardians = "0.0.6.*"
ecoscope-workflows-ext-mep = "0.0.19.*"
ecoscope-workflows-ext-mnc = "0.0.9.*"
ecoscope-workflows-ext-ste = "0.0.20.*"
ecoscope-workflows-ext-big-life = "0.0.11.*"
ecoscope-workflows-core = "0.22.17.*"
ecoscope-workflows-ext-custom = "0.0.46.*"

[environments]
compile = { features = ["compile"], no-default-feature = true }
